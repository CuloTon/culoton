name: Keepalive + healer

# Two purposes:
#  1. KEEPALIVE: micro-commit every 30 min so the repo always looks
#     active. GitHub deprioritises scheduled workflows on "low-activity"
#     repos and we hit that state several times.
#  2. HEALER: list recent runs of every scheduled workflow, find slots
#     that should have fired in the last few hours but did not, and
#     re-fire them via workflow_dispatch. This makes the whole
#     pipeline self-correcting when the GH cron scheduler is flaky.
#
# The healer needs `actions: write` so GITHUB_TOKEN can call
# `gh workflow run` against this repo's other workflows.

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 min
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run healer (re-fire missed scheduled slots)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/healer.py

      - name: Update keepalive marker and push
        run: |
          set -e
          mkdir -p .github
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/last_keepalive.txt
          git config user.name "culoton-bot"
          git config user.email "bot@culoton.fun"
          git add .github/last_keepalive.txt
          if git diff --cached --quiet; then
            echo "No change in keepalive file — skipping."
            exit 0
          fi
          git commit -m "chore: keepalive $(date -u +%Y-%m-%dT%H:%MZ)"
          git pull --rebase --autostash origin main || true
          git push
