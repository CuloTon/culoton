name: X news ping

on:
  schedule:
    # Every 3h (UTC) — ~8 tweets/day, well within Free tier (~500/month).
    # Offset by 5 minutes so we don't fire at the exact same instant as
    # the hourly Telegram news ping.
    - cron: '5 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: x-news
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Post news to X
        env:
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python scripts/x_notify.py --mode news

      - name: Persist x_announced.db
        run: |
          git config user.name "culoton-bot"
          git config user.email "bot@culoton.fun"
          git add scripts/x_announced.db
          if git diff --cached --quiet; then
            echo "Nothing announced this slot — no commit."
          else
            git commit -m "auto: x announce $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase --autostash origin main || true
            git push
          fi
