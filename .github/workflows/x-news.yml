name: X news ping

on:
  schedule:
    # Every 3h (UTC) — ~8 tweets/day, well within Free tier (~500/month).
    # Offset by 25 minutes so update-and-deploy (every 2h on minute 0,
    # ~8-15 min runtime) has finished its FTP upload before we link to
    # the article — otherwise the draft URL 404s for the holder who taps it.
    - cron: '25 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: x-news
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Post news to X
        env:
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          # Draft mode (no X cost): when X_DRAFTS_CHAT_ID is set, the
          # script sends the tweet as a TG draft instead of calling X.
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          X_DRAFTS_CHAT_ID: ${{ secrets.X_DRAFTS_CHAT_ID }}
        run: python scripts/x_notify.py --mode news

      - name: Persist x_announced.db
        run: |
          bash scripts/git_commit_push.sh \
            "auto: x announce $(date -u +%Y-%m-%dT%H:%MZ)" \
            scripts/x_announced.db
