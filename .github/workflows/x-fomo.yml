name: X FOMO ping

on:
  schedule:
    # Twice a day, offset from other crons:
    # 09:15 UTC = ~11:15 PL morning, 19:15 UTC = ~21:15 PL evening.
    - cron: '15 9,19 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: x-fomo
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Post FOMO to X
        env:
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python scripts/x_notify.py --mode fomo
