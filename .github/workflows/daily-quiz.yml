name: Daily TON quiz

on:
  schedule:
    # Primary at 15:00 UTC; backup at 18:00 UTC in case GitHub's free-tier
    # scheduler silently drops the first run (it has happened). daily_quiz.py
    # is idempotent per UTC day, so the backup is a no-op once a quiz is posted.
    - cron: '0 15 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-quiz
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Generate and post the daily quiz
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/daily_quiz.py

      - name: Persist quizzes.json
        run: |
          bash scripts/git_commit_push.sh \
            "auto: daily quiz $(date -u +%Y-%m-%d)" \
            data/quizzes.json
