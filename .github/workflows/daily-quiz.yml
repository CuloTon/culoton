name: TON quiz (auto, 4×/day)

on:
  schedule:
    # Four quizzes a day — different question each time. The script derives the
    # slot (morning/midday/afternoon/evening) from the UTC hour and is idempotent
    # per (day, slot), so a late or duplicate run is a no-op. If GitHub's
    # free-tier scheduler drops one, that slot just stays empty (3 quizzes that
    # day) — the others still fire.
    - cron: '0 8 * * *'    # morning
    - cron: '0 12 * * *'   # midday
    - cron: '0 16 * * *'   # afternoon
    - cron: '0 20 * * *'   # evening
  workflow_dispatch:
    inputs:
      slot:
        description: 'Force a specific slot (blank = derive from current UTC hour)'
        required: false
        default: ''
        type: choice
        options: ['', 'morning', 'midday', 'afternoon', 'evening']

permissions:
  contents: write

concurrency:
  group: daily-quiz
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Generate and post the quiz
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/daily_quiz.py ${{ github.event.inputs.slot != '' && format('--slot {0}', github.event.inputs.slot) || '' }}

      - name: Persist quizzes.json
        run: |
          bash scripts/git_commit_push.sh \
            "auto: quiz $(date -u +%Y-%m-%dT%H:%MZ)" \
            data/quizzes.json
