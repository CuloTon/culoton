name: TG announce (manual broadcast)

# Manual-only. Posts a one-off message to the public TG group via the bot.
# Used for contest results, schedule changes, launches — anything that
# isn't one of the automated notifiers.

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Message for the public TG group (Telegram HTML allowed)'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: tg-announce
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Post announcement
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANNOUNCE_TEXT: ${{ github.event.inputs.message }}
        run: python scripts/tg_announce.py
