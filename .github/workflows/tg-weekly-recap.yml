name: TG weekly leaderboard recap

on:
  # Automated weekly recap retired 2026-05-17 — rewards are now fully
  # discretionary (dev pays out only when they choose). The cron is removed
  # so no winner is auto-declared and weekly points are NOT auto-reset:
  # points now accumulate as a continuous activity score. workflow_dispatch
  # is kept so the dev can post a manual "top active members" shout-out
  # (no payout promise, no reset) whenever they want.
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tg-weekly-recap
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Post weekly leaderboard + reset
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Optional: admin DM with full top-10 (incl. user_ids) for prize distribution.
          # Set to your personal Telegram user_id (numeric). Find via /start to bot — your id is in the run logs.
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
        run: python scripts/tg_weekly_recap.py

      - name: Commit weekly_points reset
        run: |
          bash scripts/git_commit_push.sh \
            "auto: tg weekly recap reset $(date -u +%Y-%m-%dT%H:%MZ)" \
            data/points.json
