name: Telegram news ping

on:
  schedule:
    - cron: '0 * * * *'  # every hour, on the hour
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: telegram-news
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install PyYAML

      - name: Send news to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/telegram_notify.py --mode news

      - name: Persist announced.db
        run: |
          bash scripts/git_commit_push.sh \
            "auto: telegram announce $(date -u +%Y-%m-%dT%H:%MZ)" \
            scripts/announced.db
