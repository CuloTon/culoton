name: TG bot — register commands & description

# One-shot bootstrap. Run from the GitHub UI (Actions → Run workflow)
# after the bot script lands. Idempotent — safe to re-run any time the
# command list or descriptions change.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - name: setMyCommands + setMyDescription
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python scripts/tg_set_commands.py
