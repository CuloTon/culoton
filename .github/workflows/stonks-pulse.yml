name: Stonks chat pulse

on:
  schedule:
    - cron: '0 8 * * *'    # 08:00 UTC — morning pulse (covers 00→08)
    - cron: '0 16 * * *'   # 16:00 UTC — afternoon pulse (covers 08→16)
    - cron: '0 0 * * *'    # 00:00 UTC — overnight pulse (covers prev 16→24)
  workflow_dispatch:
    inputs:
      slot:
        description: 'Force slot (leave blank to derive from current UTC hour)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - morning
          - afternoon
          - overnight

permissions:
  contents: write
  actions: write   # so we can dispatch update-and-deploy at the end

concurrency:
  group: stonks-pulse
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Determine slot
        id: slot
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.slot }}" ]; then
            echo "slot=${{ github.event.inputs.slot }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          case "${{ github.event.schedule }}" in
            "0 8 * * *")  echo "slot=morning" >> "$GITHUB_OUTPUT" ;;
            "0 16 * * *") echo "slot=afternoon" >> "$GITHUB_OUTPUT" ;;
            "0 0 * * *")  echo "slot=overnight" >> "$GITHUB_OUTPUT" ;;
            *)            echo "slot=" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Generate pulse
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_USER_SESSION: ${{ secrets.TG_USER_SESSION }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "${{ steps.slot.outputs.slot }}" ]; then
            python scripts/stonks_pulse.py --slot "${{ steps.slot.outputs.slot }}"
          else
            python scripts/stonks_pulse.py
          fi

      - name: Commit pulse markdown
        run: |
          bash scripts/git_commit_push.sh \
            "auto: stonks pulse $(date -u +%Y-%m-%dT%H:%MZ)" \
            web/src/content/pulse

      - name: Trigger site deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run update-and-deploy.yml
