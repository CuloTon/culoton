name: TG bot interactions

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 min; each run holds a 4.5-min long-poll loop
  workflow_dispatch:

permissions:
  contents: write
  actions: write   # required for self-dispatch at the end of each run

concurrency:
  group: tg-interact
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Process pending TG updates
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/tg_bot_interact.py

      - name: Commit points + offset + quiz answers
        run: |
          bash scripts/git_commit_push.sh \
            "auto: tg bot interact $(date -u +%Y-%m-%dT%H:%MZ)" \
            data/points.json data/tg_offset.txt data/quizzes.json

      - name: Re-arm next iteration (self-dispatch)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run tg-interact.yml
