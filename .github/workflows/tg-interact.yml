name: TG bot interactions

on:
  schedule:
    - cron: '* * * * *'   # every minute — fastest cadence GH Actions allows
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tg-interact
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Process pending TG updates
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/tg_bot_interact.py

      - name: Commit points + offset
        run: |
          bash scripts/git_commit_push.sh \
            "auto: tg bot interact $(date -u +%Y-%m-%dT%H:%MZ)" \
            data/points.json data/tg_offset.txt
