name: TON Tales (weekly narrative)

# Once a week CuloScribe weaves the recent TON coverage into one narrative
# piece (a "TON Tale"). If the material can't carry a story, the script
# skips and nothing is committed — that's fine.

on:
  schedule:
    - cron: '0 18 * * 0'   # Sundays 18:00 UTC
  workflow_dispatch:
    inputs:
      force:
        description: 'Regenerate even if today already has a tale'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

# Share the deploy concurrency group with update-and-deploy so two FTP
# uploads never race.
concurrency:
  group: update-and-deploy
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Generate the weekly TON Tale
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/ton_tales.py ${{ github.event.inputs.force == 'true' && '--force' || '' }}

      - name: Commit the tale (if any)
        run: |
          bash scripts/git_commit_push.sh \
            "auto: ton tale $(date -u +%Y-%m-%dT%H:%MZ)" \
            web/src/content/tale

      - name: Was anything new committed?
        id: changed
        run: |
          if git log -1 --format='%s' HEAD | grep -q '^auto: ton tale '; then
            echo "new=true" >> "$GITHUB_OUTPUT"
          else
            echo "new=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.changed.outputs.new == 'true'
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        if: steps.changed.outputs.new == 'true'
        working-directory: web
        run: npm ci

      - name: Build site
        if: steps.changed.outputs.new == 'true'
        working-directory: web
        env:
          PUBLIC_STATS_API: ${{ secrets.PUBLIC_STATS_API }}
        run: npm run build

      - name: Deploy via Python FTPS
        if: steps.changed.outputs.new == 'true'
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: python scripts/deploy_ftp.py web/dist public_html
