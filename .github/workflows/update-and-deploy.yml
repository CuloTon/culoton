name: Update news and deploy

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-and-deploy
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Fetch and rewrite news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_news.py

      - name: Commit new content + dedup state
        run: |
          git config user.name "culoton-bot"
          git config user.email "bot@culoton.fun"
          git add web/src/content/news scripts/seen.db
          if git diff --cached --quiet; then
            echo "No new content to commit."
          else
            git commit -m "auto: update news $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Build site
        working-directory: web
        run: npm run build

      - name: Deploy to seohost via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: h66.seohost.pl
          protocol: ftp
          port: 21
          username: culoton@culoton.fun
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./web/dist/
          server-dir: ./public_html/
          dangerous-clean-slate: false
          log-level: standard
          timeout: 60000
