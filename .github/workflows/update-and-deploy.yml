name: Update news and deploy

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-and-deploy
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Fetch and rewrite news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_news.py

      - name: Commit new content + dedup state
        run: |
          git config user.name "culoton-bot"
          git config user.email "bot@culoton.fun"
          git add web/src/content/news scripts/seen.db
          if git diff --cached --quiet; then
            echo "No new content to commit."
          else
            git commit -m "auto: update news $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Build site
        working-directory: web
        run: npm run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via lftp (FTPS, mirror)
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -e "
          set ftp:ssl-allow yes;
          set ftp:ssl-protect-data yes;
          set ssl:verify-certificate no;
          set net:max-retries 3;
          set net:reconnect-interval-base 5;
          set net:timeout 30;
          set ftp:passive-mode yes;
          set ftp:use-feat no;
          open -u 'culoton@culoton.fun',\"\$FTP_PASSWORD\" ftp://h66.seohost.pl;
          mirror -R --verbose --parallel=2 --exclude-glob .git --exclude-glob .DS_Store web/dist/ public_html/;
          bye
          "
