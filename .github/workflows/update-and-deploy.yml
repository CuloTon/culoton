name: Update news and deploy

on:
  # 2026-05-25: scheduled news + blog cron WYŁĄCZONE (małe zainteresowanie portalem).
  # Pipeline odpalamy ręcznie przez workflow_dispatch — user wieczorem wybiera
  # newsy z shortlisty, ja triggeruję dispatch (opcjonalnie z roundup_kind).
  # Żeby przywrócić auto-rewrite: odkomentować poniższy `schedule:` blok.
  # schedule:
  #   - cron: '0 0,2,4,8,10,12,14,16,18,22 * * *'
  #   - cron: '0 6 * * *'   # morning
  #   - cron: '0 15 * * *'  # noon (midday)
  #   - cron: '0 20 * * *'  # evening
  workflow_dispatch:
    inputs:
      roundup_kind:
        description: 'Force a blog roundup of this kind (leave blank to skip)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - morning
          - noon
          - evening
      skip_fetch:
        description: 'Skip news fetch (rebrand/style-only deploys)'
        required: false
        default: false
        type: boolean
      target_dir:
        description: 'Remote FTP target dir (default: public_html for culoton.fun; for sibling domain use e.g. ../brainrot-ton.fun/public_html or domains/brainrot-ton.fun/public_html)'
        required: false
        default: 'public_html'
        type: string
      probe_ftp:
        description: 'Probe FTP layout (ls / and a few candidate paths) without uploading. Use to discover correct target_dir.'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: update-and-deploy
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Fetch and rewrite news
        if: github.event.inputs.skip_fetch != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_news.py

      - name: Determine blog roundup kind
        id: roundup
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.roundup_kind }}" ]; then
            echo "kind=${{ github.event.inputs.roundup_kind }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          case "${{ github.event.schedule }}" in
            "0 6 * * *")  echo "kind=morning" >> "$GITHUB_OUTPUT" ;;
            "0 15 * * *") echo "kind=noon" >> "$GITHUB_OUTPUT" ;;
            "0 20 * * *") echo "kind=evening" >> "$GITHUB_OUTPUT" ;;
            *) echo "kind=" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Generate blog roundup (${{ steps.roundup.outputs.kind }})
        id: roundup_gen
        if: steps.roundup.outputs.kind != ''
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/blog_roundup.py --kind "${{ steps.roundup.outputs.kind }}"

      - name: Commit new content + dedup state
        if: github.event.inputs.skip_fetch != 'true'
        run: |
          bash scripts/git_commit_push.sh \
            "auto: update news $(date -u +%Y-%m-%dT%H:%MZ)" \
            web/src/content/news web/src/content/blog scripts/seen.db

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Build site
        working-directory: web
        env:
          PUBLIC_STATS_API: ${{ secrets.PUBLIC_STATS_API }}
        run: npm run build

      - name: Probe FTP layout (discovery only, no upload)
        if: github.event.inputs.probe_ftp == 'true'
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          python <<'PY'
          import os, ssl
          from ftplib import FTP_TLS
          ctx = ssl.create_default_context(); ctx.check_hostname = False; ctx.verify_mode = ssl.CERT_NONE
          ftp = FTP_TLS(os.environ['FTP_HOST'], timeout=30, context=ctx)
          ftp.login(os.environ['FTP_USER'], os.environ['FTP_PASSWORD'])
          ftp.prot_p(); ftp.set_pasv(True)
          print(f"PWD: {ftp.pwd()}")
          def listit(p):
              print(f"\n--- ls {p} ---")
              try:
                  ftp.cwd(p); ftp.dir()
              except Exception as e:
                  print(f"  ERR: {e}")
          for path in ["/", "/public_html", "/domains", "/domains/brainrot-ton.fun", "/domains/brainrot-ton.fun/public_html", "/brainrot-ton.fun", "/brainrot-ton.fun/public_html"]:
              listit(path)
          ftp.quit()
          PY

      - name: Deploy via Python FTPS
        if: github.event.inputs.probe_ftp != 'true'
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          TARGET_DIR: ${{ github.event.inputs.target_dir || 'public_html' }}
        run: python scripts/deploy_ftp.py web/dist "$TARGET_DIR"

      - name: Post roundup digest to Telegram (${{ steps.roundup.outputs.kind }})
        if: success() && steps.roundup.outputs.kind != '' && steps.roundup_gen.outcome == 'success'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/telegram_notify.py --mode digest --kind "${{ steps.roundup.outputs.kind }}"

      - name: Persist digest dedup state
        if: success() && steps.roundup.outputs.kind != '' && steps.roundup_gen.outcome == 'success'
        run: |
          bash scripts/git_commit_push.sh \
            "auto: telegram ${{ steps.roundup.outputs.kind }} digest $(date -u +%Y-%m-%dT%H:%MZ)" \
            scripts/announced.db

      - name: Telegram deploy notification (skip bot commits)
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -e
          SHA=$(git rev-parse HEAD)
          AUTHOR=$(git log -1 --format='%an' HEAD)
          MSG=$(git log -1 --format='%s' HEAD)
          if [ "$AUTHOR" = "culoton-bot" ]; then
            echo "Skipping notification for bot commit: $MSG"
            exit 0
          fi
          python scripts/telegram_notify.py --mode deploy \
            --sha "$SHA" \
            --author "$AUTHOR" \
            --message "$MSG"
