name: Update news and deploy

on:
  # NOTE (2026-05-29): scheduled auto-deploy DISABLED. seohost FTP from
  # GitHub Azure runners repeatedly hangs/resets on the "Deploy via Python
  # FTPS" step. We now deploy from a local Polish IP via scripts/deploy_local.py
  # (reads creds from FileZilla's saved seohost site). Re-enable only if the
  # FTP-from-CI reliability is fixed.
  #
  # schedule:
  #   - cron: '0 0,2,4,8,10,12,14,16,18,22 * * *'
  #   - cron: '0 6 * * *'   # morning roundup
  #   - cron: '0 15 * * *'  # noon roundup
  #   - cron: '0 20 * * *'  # evening roundup
  workflow_dispatch:
    inputs:
      roundup_kind:
        description: 'Force a blog roundup of this kind (leave blank to skip)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - morning
          - noon
          - evening
      skip_fetch:
        description: 'Skip news fetch (rebrand/style-only deploys)'
        required: false
        default: false
        type: boolean
      deploy_ftp:
        description: 'Attempt FTP deploy to seohost (UNRELIABLE from CI — default off; deploy locally instead)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: update-and-deploy
  cancel-in-progress: false

env:
  TARGET_DIR: domains/brainrot-ton.fun/public_html

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Fetch and rewrite news
        if: github.event.inputs.skip_fetch != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_news.py

      - name: Determine blog roundup kind
        id: roundup
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.roundup_kind }}" ]; then
            echo "kind=${{ github.event.inputs.roundup_kind }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          case "${{ github.event.schedule }}" in
            "0 6 * * *")  echo "kind=morning" >> "$GITHUB_OUTPUT" ;;
            "0 15 * * *") echo "kind=noon" >> "$GITHUB_OUTPUT" ;;
            "0 20 * * *") echo "kind=evening" >> "$GITHUB_OUTPUT" ;;
            *) echo "kind=" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Generate blog roundup (${{ steps.roundup.outputs.kind }})
        id: roundup_gen
        if: steps.roundup.outputs.kind != ''
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/blog_roundup.py --kind "${{ steps.roundup.outputs.kind }}"

      - name: Commit new content + dedup state
        if: github.event.inputs.skip_fetch != 'true'
        run: |
          bash scripts/git_commit_push.sh \
            "auto: update news $(date -u +%Y-%m-%dT%H:%MZ)" \
            web/src/content/news web/src/content/blog scripts/seen.db

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Build site
        working-directory: web
        env:
          PUBLIC_STATS_API: ${{ secrets.PUBLIC_STATS_API }}
        run: npm run build

      - name: Upload built site (download + deploy locally from a Polish IP)
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: web/dist
          retention-days: 2
          if-no-files-found: error

      - name: Deploy via Python FTPS to brainrot-ton.fun
        if: github.event.inputs.deploy_ftp == 'true'
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER_MASTER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD_MASTER }}
        run: python scripts/deploy_ftp.py web/dist "$TARGET_DIR"

      # Belt-and-braces: the rebrand "preview gate" (.htaccess/.htpasswd Basic Auth)
      # was fully decommissioned 2026-06-03 — those files are no longer in the repo,
      # and the EN homepage now builds straight to dist/index.html (no home/ swap).
      # We still nuke any .htaccess/.htpasswd left on the server from older deploys,
      # because deploy_ftp.py only uploads and never deletes stale remote files.
      - name: Post-deploy cleanup (purge any stale Basic Auth gate from older deploys)
        if: github.event.inputs.deploy_ftp == 'true'
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER_MASTER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD_MASTER }}
        run: |
          python <<'PY'
          import os, ssl
          from ftplib import FTP_TLS, error_perm
          ctx = ssl.create_default_context(); ctx.check_hostname = False; ctx.verify_mode = ssl.CERT_NONE
          ftp = FTP_TLS(os.environ['FTP_HOST'], timeout=30, context=ctx)
          ftp.login(os.environ['FTP_USER'], os.environ['FTP_PASSWORD'])
          ftp.prot_p(); ftp.set_pasv(True)
          root = "/" + os.environ['TARGET_DIR'].strip("/")
          ftp.cwd(root)
          for f in (".htaccess", ".htpasswd"):
              try:
                  ftp.delete(f); print(f"deleted {f}")
              except error_perm as e:
                  print(f"  skip {f}: {e}")
          ftp.quit()
          PY

      - name: Post roundup digest to Telegram (${{ steps.roundup.outputs.kind }})
        if: success() && steps.roundup.outputs.kind != '' && steps.roundup_gen.outcome == 'success'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/telegram_notify.py --mode digest --kind "${{ steps.roundup.outputs.kind }}"

      - name: Persist digest dedup state
        if: success() && steps.roundup.outputs.kind != '' && steps.roundup_gen.outcome == 'success'
        run: |
          bash scripts/git_commit_push.sh \
            "auto: telegram ${{ steps.roundup.outputs.kind }} digest $(date -u +%Y-%m-%dT%H:%MZ)" \
            scripts/announced.db

      - name: Telegram deploy notification (skip bot commits)
        if: false && success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -e
          SHA=$(git rev-parse HEAD)
          AUTHOR=$(git log -1 --format='%an' HEAD)
          MSG=$(git log -1 --format='%s' HEAD)
          if [ "$AUTHOR" = "culoton-bot" ]; then
            echo "Skipping notification for bot commit: $MSG"
            exit 0
          fi
          python scripts/telegram_notify.py --mode deploy \
            --sha "$SHA" \
            --author "$AUTHOR" \
            --message "$MSG"
