name: Telegram $CULO market pulse

on:
  schedule:
    # 4x a day at :30 (UTC) — offset from hourly news ping (:00) and
    # from blog roundup slots (6/11/17). UTC 0:30/6:30/12:30/18:30 =
    # PL ~2:30/8:30/14:30/20:30 (CEST) — covers morning, midday,
    # evening, and a midnight pulse for the overseas crowd.
    - cron: '30 0,6,12,18 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: telegram-mcap
  cancel-in-progress: false

jobs:
  pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install PyYAML
      - name: Post $CULO market pulse
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/telegram_notify.py --mode mcap
