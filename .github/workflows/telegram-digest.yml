name: Telegram roundup digest (backup)

on:
  schedule:
    # Backup poster for the three roundup digests. update-and-deploy posts
    # each roundup to the chat inline right after it deploys (06:00 / 15:00 /
    # 20:00 UTC); this workflow runs ~30 min later and re-tries any roundup
    # that didn't make it out (transient TG error, slow generation, URL not
    # propagated yet). It calls --mode digest with no --kind, which walks all
    # three kinds and is idempotent via announced.db, so it never double-posts.
    - cron: '30 6 * * *'    # after the morning roundup
    - cron: '30 15 * * *'   # after the midday roundup
    - cron: '30 20 * * *'   # after the evening roundup
    - cron: '30 22 * * *'   # late catch-all for anything still unposted
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: telegram-digest
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install PyYAML

      - name: Post any unposted roundup digests to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/telegram_notify.py --mode digest

      - name: Persist announced.db
        run: |
          bash scripts/git_commit_push.sh \
            "auto: telegram digest $(date -u +%Y-%m-%dT%H:%MZ)" \
            scripts/announced.db
